# CI + supply-chain pipeline for the AHP multi-client sync demo.
#
# Two jobs:
#   build-test  — always: format/vet/test/build the Go code and (on any
#                 push/PR) build the container image and scan it.
#   release     — main only: push the image to GHCR, generate an SBOM,
#                 sign the image keylessly with cosign (OIDC, no
#                 long-lived keys), and attach SLSA build provenance.
#
# Every control below is annotated with WHY it exists so the pipeline is
# self-documenting for reviewers.
#
# SUPPLY-CHAIN HARDENING NOTE (2026-07): third-party GitHub Actions are a
# real attack surface, not a theoretical one. aquasecurity/trivy-action was
# compromised on 2026-03-19 when an attacker force-pushed 76 of its 77
# mutable version tags to commits serving an infostealer payload; only
# v0.35.0 survived because GitHub's immutable-release protection had been
# enabled just before that tag was cut. See:
# https://github.com/aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23
#
# Mitigation applied here: every action in this workflow (first-party
# actions/*, docker/*, and third-party anchore/sigstore/aquasecurity/
# zizmorcore) is pinned to a verified full 40-char commit SHA, not a
# mutable tag, with the human-readable version kept as a trailing comment.
# A zizmor step below enforces this as a CI gate — the build fails if any
# future edit reintroduces a tag reference. SHAs were resolved from each
# vendor's own GitHub Releases/tags API immediately before pinning; always
# re-verify against the vendor's release page rather than trusting a SHA
# from an unverified third party, per
# https://docs.github.com/en/actions/reference/security/secure-use#using-third-party-actions.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: jobs opt into the exact scopes they need.
permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      # persist-credentials:false — the checkout token is never needed
      # past this step, so don't leave it in .git/config where a later
      # step (or a malicious dependency) could read and exfiltrate it.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Statically audits this workflow file for exactly the class of risk
      # described above: unpinned/mutable-tag action refs, template
      # injection, excessive permissions, credential leakage. Grafana Labs
      # adopted this same tool org-wide after the trivy-action incident for
      # this exact reason. advanced-security:false because this runs
      # without a paid GitHub Advanced Security tier; it still fails the
      # job on findings. https://github.com/zizmorcore/zizmor
      - name: Audit workflow security (zizmor)
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.23"
          check-latest: true

      # gofmt as a gate: unformatted code fails the build instead of
      # silently drifting.
      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race detector on)
        run: go test -race ./...

      - name: Build
        run: |
          go build -o bin/host   ./host
          go build -o bin/viewer ./clients/viewer
          go build -o bin/agent  ./clients/agent

      # Build the image locally (no push) so PRs exercise the Dockerfile
      # and the scan below runs against the real artifact.
      - name: Build image (local, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE }}:ci-${{ github.sha }}

      # Fail the build on fixable HIGH/CRITICAL CVEs in the image so
      # vulnerable dependencies are caught before release.
      #
      # SUPPLY-CHAIN NOTE: trivy-action suffered a real tag-hijack attack
      # (2026-03-19): 76 of 77 mutable version tags were force-pushed to
      # commits serving an infostealer payload. Only v0.35.0 (protected by
      # GitHub's immutable-release feature) and this exact commit SHA were
      # unaffected. Per GitHub's and Aqua's own remediation guidance, this
      # workflow pins by full commit SHA rather than a mutable tag.
      # Verified-safe SHA for v0.35.0: 57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      # https://github.com/aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23
      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:ci-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  release:
    # Only publish from main, never from PRs (which could come from forks).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push image to GHCR
      id-token: write        # OIDC token for keyless cosign + provenance
      attestations: write    # attach the provenance attestation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (by digest)
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # Software Bill of Materials: syft produces a CycloneDX SBOM that
      # travels with the release for downstream vuln management / audit.
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cdx.json

      # Keyless signing: cosign uses the job's OIDC identity, so there is
      # no private key to store or rotate. The signature is stored in the
      # registry alongside the image.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Interpolate expression outputs via env vars rather than directly in
      # the run: script, so the shell never re-parses attacker-influenced
      # text as code (defends against template-injection into run: blocks).
      - name: Sign image (keyless, OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ env.IMAGE }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REF}@${IMAGE_DIGEST}"

      # SLSA build provenance: a signed attestation binding the image
      # digest to the exact workflow/commit that built it, so consumers
      # can verify where the artifact came from.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
